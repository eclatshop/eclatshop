<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>에끌라뷰</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f4f4f4;
      color: #222;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .page {
      width: 100%;
      max-width: 650px;
      min-height: 100vh;
      margin: 0 auto;
      background: #ffffff;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 35px 28px;
      border-bottom: 1px solid #eeeeee;
    }

    .profile-photo {
      width: 95px;
      height: 95px;
      flex-shrink: 0;
      overflow: hidden;
      border-radius: 50%;
      background: #f1e7e7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      font-weight: bold;
      color: #a88383;
    }

    .profile-text h1 {
      margin: 0 0 10px;
      font-size: 25px;
    }

    .profile-text p {
      margin: 0;
      color: #777777;
      font-size: 16px;
      line-height: 1.6;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      height: 70px;
      border-bottom: 1px solid #eeeeee;
    }

    .menu div {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999999;
      font-size: 25px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      background: #ffffff;
    }

    .product {
      position: relative;
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: #f2f2f2;
    }

    .product img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.2s ease;
    }

    .product:hover img {
      transform: scale(1.03);
    }

    footer {
      margin-top: 70px;
      padding: 25px 10px;
      background: #f6f6f6;
      color: #bbbbbb;
      text-align: center;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .profile {
        padding: 28px 20px;
        gap: 15px;
      }

      .profile-photo {
        width: 82px;
        height: 82px;
      }

      .profile-text h1 {
        font-size: 22px;
      }

      .profile-text p {
        font-size: 14px;
      }

      .menu {
        height: 62px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <section class="profile">
      <div class="profile-photo">E</div>

      <div class="profile-text">
        <h1>에끌라뷰</h1>
        <p>
          ✨ Beauty Select Shop<br>
          나를 위한 가장 예쁜 선택 🤍
        </p>
      </div>
    </section>

    <section class="menu">
      <div>↗</div>
      <div>◎</div>
      <div>⌕</div>
    </section>

    <section class="products">

      <a class="product"
         href="https://link.coupang.com/a/fCsZ0qfgCi"
         target="_blank"
         rel="noopener noreferrer">
        <img src="images/1.jpg" alt="상품 1" onerror="changeImage(this, 1)">
      </a>

      <a class="product"
         href="https://link.coupang.com/a/fCtMszlcaa"
         target="_blank"
         rel="noopener noreferrer">
        <img src="images/2.jpg" alt="상품 2" onerror="changeImage(this, 2)">
      </a>

      <a class="product"
         href="https://link.coupang.com/a/fCtIRa3P3I"
         target="_blank"
         rel="noopener noreferrer">
        <img src="images/3.jpg" alt="상품 3" onerror="changeImage(this, 3)">
      </a>

      <a class="product"
         href="https://link.coupang.com/a/fCtGszkiQ0"
         target="_blank"
         rel="noopener noreferrer">
        <img src="images/4.jpg" alt="상품 4" onerror="changeImage(this, 4)">
      </a>

      <a class="product"
         href="https://link.coupang.com/a/fCtEnHIQG4"
         target="_blank"
         rel="noopener noreferrer">
        <img src="images/5.jpg" alt="상품 5" onerror="changeImage(this, 5)">
      </a>

      <a class="product"
         href="https://link.coupang.com/a/fCtABnQYq4"
         target="_blank"
         rel="noopener noreferrer">
        <img src="images/6.jpg" alt="상품 6" onerror="changeImage(this, 6)">
      </a>

      <a class="product"
         href="https://link.coupang.com/a/fCtwofiDIa"
         target="_blank"
         rel="noopener noreferrer">
        <img src="images/7.jpg" alt="상품 7" onerror="changeImage(this, 7)">
      </a>

      <a class="product"
         href="https://link.coupang.com/a/fCtqQRmHme"
         target="_blank"
         rel="noopener noreferrer">
        <img src="images/8.jpg" alt="상품 8" onerror="changeImage(this, 8)">
      </a>

      <a class="product"
         href="https://link.coupang.com/a/fCtneRJ1Ai"
         target="_blank"
         rel="noopener noreferrer">
        <img src="images/9.jpg" alt="상품 9" onerror="changeImage(this, 9)">
      </a>

    </section>

    <footer>
      ECLATVIEW Beauty Select Shop
    </footer>

  </main>

  <script>
    const extensions = ["png", "jpeg", "webp"];
    const attempts = {};

    function changeImage(image, number) {
      attempts[number] = attempts[number] || 0;

      if (attempts[number] < extensions.length) {
        image.src = "images/" + number + "." + extensions[attempts[number]];
        attempts[number]++;
      } else {
        image.onerror = null;
      }
    }
  </script>
</body>
</html>
